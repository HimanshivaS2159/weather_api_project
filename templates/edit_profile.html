<!DOCTYPE html>

<html>

<head>

<title>Account Settings</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;

    background:linear-gradient(
        135deg,
        #0f2027,
        #203a43,
        #2c5364
    );
}

.card{

    width:700px;

    background:linear-gradient(
        180deg,
        #ffffff,
        #f1f5f9
    );

    padding:40px;

    border-radius:24px;

    box-shadow:
    0 15px 35px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
}

.section-title{
    color:#1e3a8a;
    margin-bottom:15px;
    margin-top:15px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:6px;
    font-weight:600;
    color:#374151;
}

input{

    padding:13px;

    border:1px solid #d1d5db;

    border-radius:10px;

    font-size:15px;
}

input:focus{
    outline:none;

    border-color:#2563eb;

    box-shadow:
    0 0 10px rgba(37,99,235,0.2);
}

.security-section{
    margin-top:30px;
}

button{

    width:100%;

    margin-top:25px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.back-link{
    text-align:center;
    margin-top:20px;
}

.back-link a{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#64748b;
    font-size:13px;
}

</style>

</head>

<body>

<div class="card">


<h1>Account Settings</h1>

<form method="POST">

    <h3 class="section-title">
        Personal Information
    </h3>

    <div class="grid">

        <div class="input-group">

            <label>Full Name</label>

            <input
                type="text"
                name="name"
                value="{{ user.name }}"
                required>

        </div>

        <div class="input-group">

            <label>Username</label>

            <input
                type="text"
                value="{{ user.username }}"
                readonly>

        </div>

        <div class="input-group">

            <label>Date of Birth</label>

            <input
                type="date"
                name="dob"
                value="{{ user.dob }}"
                required>

        </div>

        <div class="input-group">

            <label>Mobile Number</label>

            <input
                 type="tel"
                 name="mobile"
                 value="{{ user.mobile }}"
                  pattern="[0-9]{10}"
                 maxlength="10"
                 required>

        </div>

    </div>

    <div class="security-section">

        <h3 class="section-title">
            Security Settings
        </h3>

        <div class="grid">

            <div class="input-group">

                <label>Current Password</label>

                <input
                    type="password"
                    name="old_password">

            </div>

            <div class="input-group">

                <label>New Password</label>

                <input
                    type="password"
                    name="new_password">

            </div>

        </div>

        <div class="input-group"
             style="margin-top:15px;">

            <label>Confirm Password</label>

            <input
                type="password"
                name="confirm_password">

        </div>

    </div>

    <button type="submit">
        Save Changes
    </button>

</form>

<div class="back-link">

    <a href="/dashboard">
        Back to Dashboard
    </a>

</div>

<div class="footer">

     Weather Intelligence Platform

</div>


</div>

</body>

</html>
